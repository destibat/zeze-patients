name: alice

services:
  db:
    image: mariadb:10.11
    container_name: alice_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data_alice:/var/lib/mysql
    networks:
      - alice_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    image: zezepagnon-backend
    container_name: alice_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads_alice:/app/uploads
    networks:
      - alice_network
      - zeze_proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    image: zezepagnon-frontend
    container_name: alice_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - zeze_proxy

volumes:
  db_data_alice:
  uploads_alice:

networks:
  alice_network:
    driver: bridge
  zeze_proxy:
    external: true
