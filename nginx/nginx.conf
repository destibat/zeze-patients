# ─── patients.zezepagnon.solutions ───────────────────────────────────────────
server {
    listen 80;
    server_name patients.zezepagnon.solutions;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name patients.zezepagnon.solutions;

    ssl_certificate     /etc/nginx/certs/patients/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/patients/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/ {
        proxy_pass http://zezepagnon_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://zezepagnon_backend:3000;
    }

    location / {
        proxy_pass http://zezepagnon_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

